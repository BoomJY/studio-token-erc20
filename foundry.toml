[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.28"
optimizer = true
optimizer_runs = 200

# 模糊测试运行次数:对金额等参数随机取值的次数,越大覆盖越广(也越慢)
[fuzz]
runs = 256

# forge lint 配置
# 排除 erc20-unchecked-transfer:该规则要求检查 transfer/transferFrom 返回值,
# 这对生产合约是好建议,但本仓库仅在【测试代码】里出现这类裸调用——
# 那里要么用 vm.expectRevert 断言它会回滚,要么调用后直接断言余额状态,
# 返回值无需再查。源码合约本身不直接调用外部代币的 transfer,故安全排除。
[lint]
exclude_lints = ["erc20-unchecked-transfer"]

# 更多配置见 https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
